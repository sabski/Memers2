name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run game logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node tests/runner.js
